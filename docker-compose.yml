services:
  wordpress:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME:-elena_wp}
      WORDPRESS_DB_USER: ${DB_USER:-elena}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      WORDPRESS_TABLE_PREFIX: ${TABLE_PREFIX:-wp_}
      WP_HOME: ${WP_HOME:-http://localhost}
      WP_SITEURL: ${WP_SITEURL:-http://localhost}
    volumes:
      - wp_uploads:/var/www/html/wp-content/uploads
      - /root/elena/wp-content/themes:/var/www/html/wp-content/themes
      - data/coolify/services/josgk00c0ook04cs8cck00c4/themes:/var/www/html/wp-content/themes
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/wp-login.php" ]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-elena_wp}
      MYSQL_USER: ${DB_USER:-elena}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  wp_uploads:
